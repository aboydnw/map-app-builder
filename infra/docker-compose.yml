services:
  database:
    image: ghcr.io/stac-utils/pgstac:v0.9.8
    environment:
      POSTGRES_USER: username
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgis
      PGUSER: username
      PGPASSWORD: password
      PGDATABASE: postgis
    ports:
      - "5439:5432"
    volumes:
      - pgstac-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U username -d postgis"]
      interval: 5s
      timeout: 5s
      retries: 5

  stac-api:
    image: ghcr.io/stac-utils/stac-fastapi-pgstac:6.2.1
    ports:
      - "8081:8081"
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8081
      POSTGRES_USER: username
      POSTGRES_PASS: password
      POSTGRES_DBNAME: postgis
      POSTGRES_HOST_READER: database
      POSTGRES_HOST_WRITER: database
      POSTGRES_PORT: 5432
      DB_MIN_CONN_SIZE: 1
      DB_MAX_CONN_SIZE: 10
      ENABLE_TRANSACTIONS_EXTENSIONS: "TRUE"
    depends_on:
      database:
        condition: service_healthy

  titiler:
    image: ghcr.io/developmentseed/titiler:latest
    platform: linux/amd64
    ports:
      - "8000:8000"
    command: uvicorn titiler.application.main:app --host 0.0.0.0 --port 8000 --workers 1

  fileserver:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./data:/usr/share/nginx/html/data:ro

volumes:
  pgstac-data:
